services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fhir
      POSTGRES_PASSWORD: fhir
      POSTGRES_DB: fhir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhir"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://fhir:fhir@postgres:5432/fhir?sslmode=disable"
      MIGRATIONS_PATH: migrations
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
