version: "2"

run:
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - whitespace
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # too noisy for FHIR structs
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam # FHIR resource structs are large by design
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - unparam
      - path: testdata/
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/goodeworkers/fhir-map
